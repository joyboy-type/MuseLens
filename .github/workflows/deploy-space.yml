name: Deploy Hugging Face Space

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hugging-face-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Require a curated demo corpus
        run: test -f demo_assets/manifest.json
      - name: Package the Space without training data or local state
        run: python scripts/package_space.py "$RUNNER_TEMP/muselens-space"
      - name: Install the Hugging Face publisher
        run: python -m pip install 'huggingface_hub>=0.34,<2'
      - name: Publish Docker Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/publish_space.py "$RUNNER_TEMP/muselens-space" --repo-id sinbaby/MuseLens
